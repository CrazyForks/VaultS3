name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A classic Personal Access Token (repo scope) stored as the
          # PERSONAL_ACCESS_TOKEN repo secret. Needed so the bot can store
          # signatures. Without it, the workflow fails closed (no one is
          # marked signed), which is the safe default.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/Kodiqa-Solutions/VaultS3/blob/main/.github/CLA.md' # adjust org/repo if different
          branch: 'main'
          # Maintainers and bots are exempt from signing.
          allowlist: EnizNeziric,eniz1806,dependabot[bot],*[bot]

name: DCO

# Developer Certificate of Origin: every commit in a pull request must carry a
# "Signed-off-by:" line (added with `git commit -s`), attesting the contributor
# has the right to submit the code under the project's license. This is a
# lightweight provenance check that complements the CLA. Self-contained — no
# third-party action, no secrets.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          fail=0
          for c in $(git rev-list "$base..$head"); do
            # Skip merge commits (more than one parent).
            if [ "$(git rev-list --parents -n1 "$c" | wc -w)" -gt 2 ]; then
              continue
            fi
            if ! git log -1 --format='%B' "$c" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              author="$(git log -1 --format='%an <%ae>' "$c")"
              echo "::error::Commit $c by $author is missing a 'Signed-off-by' line. Re-commit with: git commit -s"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "DCO check failed. Sign off your commits with 'git commit -s --amend' (or 'git rebase --signoff')."
            exit 1
          fi
          echo "All commits are signed off. ✔"
